name: Retrack

permissions:
  contents: read

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'Dockerfile'
      - 'Dockerfile.*'
      - '*.md'
      - 'retrack.toml'
      - '.husky/**'
      - 'dev/**'

env:
  CARGO_TERM_COLOR: always
  DATABASE_URL: postgres://postgres@localhost:5432/retrack
  RUST_LOG: debug

jobs:
  ci:
    name: API Build (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        rust: [ stable ]
    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v6
        name: Checkout

      - name: Install Protoc
        uses: arduino/setup-protoc@v3

      # Always install nightly toolchain for `Rustfmt`.
      - name: Install toolchain ${{ matrix.rust }}
        run: |
          rustup toolchain install ${{ matrix.rust }} nightly
          rustup override set ${{ matrix.rust }}
          rustup component add clippy
          rustup component add --toolchain nightly rustfmt
          cargo install --force sqlx-cli

      - name: Cache Dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check format
        run: cargo +nightly fmt --all -- --check

      - name: Create test database
        run: |
          cargo sqlx database create
          cargo sqlx migrate run

      - name: Test (default features)
        timeout-minutes: 6
        run: cargo test --all -- --nocapture

      - name: Check database schema
        run: cargo sqlx prepare --check

      - name: Build (default features)
        run: cargo build --release

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
  ci-perf:
    name: JS Runtime Perf Harness (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Install Protoc
        uses: arduino/setup-protoc@v3

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable
          rustup override set stable

      - name: Cache Dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci-perf"
          cache-all-crates: true

      - name: Set Node.js 22.x
        uses: actions/setup-node@v6
        with:
          node-version: 22.x

      - name: Run perf harness and record history
        run: make perf ANALYZE=1

      - name: Upload perf report JSON
        uses: actions/upload-artifact@v7
        with:
          name: perf-report
          path: /tmp/perf.json
          retention-days: 30

      - name: Commit perf history
        if: success() && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .perf/history.jsonl
          git diff --cached --quiet || git commit -m "chore: update JS runtime perf history [skip ci]" && git push

  ci-web-scraper:
    name: Web Scraper Build (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        name: Checkout

      - name: Set Node.js 22.x
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ws

      - name: Test
        run: npm test -w components/retrack-web-scraper

      - name: Build
        run: npm run build -w components/retrack-web-scraper

